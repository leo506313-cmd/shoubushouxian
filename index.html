<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手部受限活动留言</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 18px;
            overflow-x: auto;
            overflow-y: auto;
        }

        h1 {
            text-align: center;
            color: #333;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
            z-index: 10;
            position: relative;
            padding-top: 30px;
            pointer-events: none;
            font-size: 60px;
            margin-bottom: 50px;
        }

        #boardWrap {
            width: 100%;
            overflow-x: auto;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        #board {
            position: relative;
            width: 1600px;
            min-width: 100%;
            height: 1500px;
        }

        #myModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            z-index: 1500;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 35px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        .modal-content h2 {
            margin-top: 0;
            color: #ff6b6b;
            font-size: 30px;
        }

        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0 18px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 18px;
            box-sizing: border-box;
        }

        .modal-content textarea {
            height: 120px;
            resize: none;
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            background-color: #4facfe;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            font-weight: bold;
        }

        .btn-close {
            background-color: #ccc;
        }

        .btn:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }

        #addBtn {
            position: fixed;
            right: 40px;
            bottom: 40px;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background-color: #ff6b6b;
            color: white;
            font-size: 50px;
            line-height: 85px;
            text-align: center;
            border: none;
            box-shadow: 0 6px 20px rgba(255,107,107,0.6);
            cursor: pointer;
            z-index: 900;
            transition: 0.3s;
            padding: 0;
        }

        #addBtn:hover {
            transform: scale(1.1) rotate(90deg);
        }

        .sticky-note {
            position: absolute;
            width: 300px;
            padding: 20px 25px;
            border-radius: 8px;
            box-shadow: 3px 5px 15px rgba(0,0,0,0.15);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            cursor: grab;
            user-select: none;
        }

        .sticky-note:active {
            cursor: grabbing;
        }

        .sticky-note:hover {
            transform: scale(1.05) rotate(0deg);
            box-shadow: 5px 10px 20px rgba(0,0,0,0.3);
            z-index: 100;
        }
        
        .note-header { 
            font-weight: bold;
            margin-bottom: 12px;
            border-bottom: 2px dashed rgba(0,0,0,0.2);
            padding-bottom: 8px;
            font-size: 18px;
        }

        .note-text { 
            font-size: 20px;
            line-height: 1.6;
            word-wrap: break-word;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }
        
        .comments-section {
            background: rgba(255,255,255,0.5);
            border-radius: 5px;
            padding: 12px;
            margin-bottom: 15px;
            font-size: 16px;
            max-height: 150px;
            overflow-y: auto;
            cursor: default;
        }

        .comment-item {
            margin-bottom: 8px;
            border-bottom: 1px dotted rgba(0,0,0,0.1);
            padding-bottom: 4px;
            word-break: break-word;
        }

        .comment-user {
            font-weight: bold;
            color: #444;
        }

        .note-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .footer-left {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .like-btn,
        .comment-trigger {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0;
            color: #333;
        }

        .like-active {
            color: #e74c3c;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: rgba(255,255,255,0.6);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            padding: 6px 10px;
        }

        .empty-tip {
            text-align: center;
            color: #666;
            font-size: 24px;
            margin-top: 100px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 34px;
                margin-bottom: 30px;
                padding-top: 20px;
            }

            .sticky-note {
                width: 260px;
                padding: 16px 18px;
            }

            .note-text {
                font-size: 18px;
            }

            .note-header {
                font-size: 16px;
            }

            #addBtn {
                right: 20px;
                bottom: 20px;
                width: 72px;
                height: 72px;
                line-height: 72px;
                font-size: 42px;
            }
        }
    </style>
</head>
<body>
    <h1>✨ 手部受限活动留言 ✨</h1>

    <div id="boardWrap">
        <div id="board"></div>
    </div>

    <button id="addBtn" onclick="openModal()">+</button>

    <div id="myModal">
        <div class="modal-content">
            <h2 id="modalTitle">留下你的足迹</h2>
            <input type="text" id="userNameInput" placeholder="你的名字（必填）" />
            <input type="text" id="userDeptInput" placeholder="所属部门（必填）" />
            <textarea id="userMessageInput" placeholder="写下你想说的话..."></textarea>
            <div class="btn-group">
                <button class="btn btn-close" onclick="closeModal()">取消</button>
                <button class="btn" onclick="submitMessage()">贴上留言</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBLxME8s4RCB-AMZ5NeuRAlFJF5fSKhNpA",
            authDomain: "shoubuhsouxian.firebaseapp.com",
            databaseURL: "https://shoubuhsouxian-default-rtdb.firebaseio.com",
            projectId: "shoubuhsouxian",
            storageBucket: "shoubuhsouxian.firebasestorage.app",
            messagingSenderId: "1059852842523",
            appId: "1:1059852842523:web:4eb41745c5b59ffffeeabe",
            measurementId: "G-NZC53QYRQY"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const messagesRef = db.ref("messages");

        const colors = [
            "#ff9a9e", "#fecfef", "#a1c4fd", "#fdcbf1",
            "#e0c3fc", "#8fd3f4", "#f6d365", "#fda085"
        ];

        const modal = document.getElementById("myModal");
        const nameInput = document.getElementById("userNameInput");
        const deptInput = document.getElementById("userDeptInput");
        const msgInput = document.getElementById("userMessageInput");
        const board = document.getElementById("board");

        let messages = [];
        let currentUser = localStorage.getItem("current_user") || "";
        let currentDept = localStorage.getItem("current_dept") || "";
        let currentUserId = localStorage.getItem("current_user_id") || "";

        if (!currentUserId) {
            currentUserId = "user_" + Date.now() + "_" + Math.random().toString(36).slice(2, 10);
            localStorage.setItem("current_user_id", currentUserId);
        }

        window.onload = function () {
            if (currentUser) nameInput.value = currentUser;
            if (currentDept) deptInput.value = currentDept;
        };

        messagesRef.on("value", function (snapshot) {
            const data = snapshot.val() || {};
            messages = Object.keys(data).map(key => ({
                id: key,
                ...data[key]
            }));

            messages.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            renderMessages();
        });

        function openModal() {
            if (currentUser) nameInput.value = currentUser;
            if (currentDept) deptInput.value = currentDept;
            modal.style.display = "flex";
        }

        function closeModal() {
            modal.style.display = "none";
        }

        function ensureIdentity() {
            if (!currentUser || !currentDept) {
                alert("请先填写你的名字和部门。");
                openModal();
                return false;
            }
            return true;
        }

        function submitMessage() {
            const name = nameInput.value.trim();
            const dept = deptInput.value.trim();
            const text = msgInput.value.trim();

            if (!name || !dept || !text) {
                alert("请填全所有信息哦！");
                return;
            }

            currentUser = name;
            currentDept = dept;
            localStorage.setItem("current_user", currentUser);
            localStorage.setItem("current_dept", currentDept);

            const newMessage = {
                ownerId: currentUserId,
                name: name,
                dept: dept,
                text: text,
                color: colors[Math.floor(Math.random() * colors.length)],
                top: Math.floor(Math.random() * 1300) + "px",
                left: Math.floor(Math.random() * 900 + 80) + "px",
                rotation: (Math.random() * 20 - 10).toFixed(2),
                createdAt: Date.now(),
                likes: {},
                comments: {}
            };

            messagesRef.push(newMessage)
                .then(() => {
                    msgInput.value = "";
                    closeModal();
                })
                .catch(err => {
                    alert("留言提交失败：" + err.message);
                });
        }

        function toggleLike(messageId) {
            if (!ensureIdentity()) return;

            const likeRef = messagesRef.child(messageId).child("likes").child(currentUserId);
            likeRef.once("value", function (snapshot) {
                if (snapshot.exists()) {
                    likeRef.remove();
                } else {
                    likeRef.set({
                        userId: currentUserId,
                        name: currentUser,
                        dept: currentDept
                    });
                }
            });
        }

        function addComment(messageId) {
            if (!ensureIdentity()) return;

            const commentText = prompt("请输入你的评论：");
            if (!commentText || !commentText.trim()) return;

            messagesRef.child(messageId).child("comments").push({
                userId: currentUserId,
                user: currentUser,
                dept: currentDept,
                text: commentText.trim(),
                createdAt: Date.now()
            });
        }

        function deleteMessage(messageId) {
            const msg = messages.find(m => m.id === messageId);
            if (!msg) return;

            if (msg.ownerId !== currentUserId) {
                alert("只能删除自己发布的留言。");
                return;
            }

            if (confirm("确定要删除这条留言吗？")) {
                messagesRef.child(messageId).remove();
            }
        }

        function editMessage(messageId) {
            const msg = messages.find(m => m.id === messageId);
            if (!msg) return;

            if (msg.ownerId !== currentUserId) {
                alert("只能修改自己发布的留言。");
                return;
            }

            const newText = prompt("修改留言内容：", msg.text || "");
            if (!newText || !newText.trim()) return;

            messagesRef.child(messageId).update({
                text: newText.trim()
            });
        }

        function renderMessages() {
            board.innerHTML = "";

            if (!messages.length) {
                const empty = document.createElement("div");
                empty.className = "empty-tip";
                empty.textContent = "还没有留言，来写下第一条吧～";
                board.appendChild(empty);
                return;
            }

            messages.forEach(msg => {
                const note = document.createElement("div");
                note.className = "sticky-note";
                note.style.backgroundColor = msg.color || "#fff3a3";
                note.style.top = msg.top || "100px";
                note.style.left = msg.left || "80px";
                note.style.transform = `rotate(${msg.rotation || 0}deg)`;

                const likesObj = msg.likes || {};
                const likesCount = Object.keys(likesObj).length;
                const hasLiked = !!likesObj[currentUserId];

                const commentsObj = msg.comments || {};
                const comments = Object.keys(commentsObj)
                    .map(key => commentsObj[key])
                    .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
                const commentsCount = comments.length;

                let commentsHtml = "";
                if (comments.length > 0) {
                    commentsHtml = '<div class="comments-section" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">';
                    comments.forEach(c => {
                        commentsHtml += `<div class="comment-item"><span class="comment-user">${escapeHtml(c.user || "匿名")}：</span>${escapeHtml(c.text || "")}</div>`;
                    });
                    commentsHtml += "</div>";
                }

                let actionHtml = "";
                if (msg.ownerId === currentUserId) {
                    actionHtml = `
                        <div class="action-btns">
                            <button class="action-btn" onclick="editMessage('${msg.id}')">✏️</button>
                            <button class="action-btn" onclick="deleteMessage('${msg.id}')">🗑️</button>
                        </div>
                    `;
                }

                note.innerHTML = `
                    <div class="note-header">👤 ${escapeHtml(msg.name || "")} <span style="color:#666; font-weight:normal; font-size:14px;">(${escapeHtml(msg.dept || "")})</span></div>
                    <div class="note-text">${escapeHtml(msg.text || "")}</div>
                    ${commentsHtml}
                    <div class="note-footer">
                        <div class="footer-left">
                            <button class="like-btn ${hasLiked ? "like-active" : ""}" onclick="toggleLike('${msg.id}')">
                                ${hasLiked ? "❤️" : "🤍"} ${likesCount}
                            </button>
                            <button class="comment-trigger" onclick="addComment('${msg.id}')">
                                💬 ${commentsCount}
                            </button>
                        </div>
                        ${actionHtml}
                    </div>
                `;

                makeDraggable(note, msg.id, msg.rotation || 0);
                board.appendChild(note);
            });
        }

        function makeDraggable(element, messageId, rotation) {
            let isDragging = false;
            let startX, startY, initialLeft, initialTop;

            element.addEventListener("mousedown", dragStart);
            element.addEventListener("touchstart", dragStart, { passive: false });

            function dragStart(e) {
                if (e.target.closest("button") || e.target.closest(".comments-section")) return;

                isDragging = true;
                element.style.zIndex = 1000;
                element.style.transform = "scale(1.05) rotate(0deg)";

                if (e.type === "touchstart") {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                } else {
                    startX = e.clientX;
                    startY = e.clientY;
                }

                initialLeft = element.offsetLeft;
                initialTop = element.offsetTop;

                document.addEventListener("mousemove", drag);
                document.addEventListener("touchmove", drag, { passive: false });
                document.addEventListener("mouseup", dragEnd);
                document.addEventListener("touchend", dragEnd);
            }

            function drag(e) {
                if (!isDragging) return;
                if (e.type === "touchmove") e.preventDefault();

                let currentX, currentY;
                if (e.type === "touchmove") {
                    currentX = e.touches[0].clientX;
                    currentY = e.touches[0].clientY;
                } else {
                    currentX = e.clientX;
                    currentY = e.clientY;
                }

                const dx = currentX - startX;
                const dy = currentY - startY;

                element.style.left = (initialLeft + dx) + "px";
                element.style.top = (initialTop + dy) + "px";
            }

            function dragEnd() {
                if (!isDragging) return;
                isDragging = false;

                element.style.zIndex = "";
                element.style.transform = `rotate(${rotation}deg)`;

                document.removeEventListener("mousemove", drag);
                document.removeEventListener("touchmove", drag);
                document.removeEventListener("mouseup", dragEnd);
                document.removeEventListener("touchend", dragEnd);

                messagesRef.child(messageId).update({
                    left: element.style.left,
                    top: element.style.top
                });
            }
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        window.onclick = function (event) {
            if (event.target === modal) closeModal();
        };
    </script>
</body>
</html>
