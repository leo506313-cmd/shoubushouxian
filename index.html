<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>手部受限活动留言</title>

<style>
body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    font-size: 18px;
    overflow-x: auto;
    overflow-y: auto;
    -webkit-text-size-adjust: 100%;
}

h1 {
    text-align: center;
    color: #333;
    text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
    position: relative;
    padding: 24px 16px 0;
    margin: 0 0 14px;
    font-size: clamp(28px, 5vw, 60px);
    line-height: 1.2;
    pointer-events: none;
}

#syncStatus {
    text-align: center;
    font-size: 14px;
    color: #666;
    margin-bottom: 14px;
    padding: 0 12px;
}

#boardWrap {
    width: 100%;
    overflow-x: auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 24px;
}

#board {
    position: relative;
    width: 1200px;
    min-width: 100%;
    height: 1500px;
    min-height: 1500px;
}

#myModal {
    display: none;
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
    background-color: rgba(0,0,0,0.6);
    z-index: 1500;
    justify-content: center;
    align-items: center;
    padding: 16px;
    box-sizing: border-box;
}

.modal-content {
    background-color: white;
    padding: 24px;
    border-radius: 15px;
    width: 92vw;
    max-width: 500px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    text-align: center;
    box-sizing: border-box;
}

.modal-content h2 {
    margin-top: 0;
    color: #ff6b6b;
    font-size: 28px;
}

.modal-content input,
.modal-content textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0 18px 0;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
    box-sizing: border-box;
    appearance: none;
    -webkit-appearance: none;
}

.modal-content textarea {
    height: 120px;
    resize: none;
}

.tip-text {
    font-size: 13px;
    color: #777;
    margin-top: -10px;
    margin-bottom: 12px;
    text-align: left;
}

.btn-group {
    display: flex;
    gap: 12px;
    justify-content: center;
}

.btn {
    background-color: #4facfe;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
    width: 100%;
    font-weight: bold;
    appearance: none;
    -webkit-appearance: none;
}

.btn-close {
    background-color: #ccc;
}

.btn:hover {
    opacity: 0.85;
    transform: scale(1.03);
}

#addBtn {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background-color: #ff6b6b;
    color: white;
    font-size: 42px;
    line-height: 72px;
    text-align: center;
    border: none;
    box-shadow: 0 6px 20px rgba(255,107,107,0.6);
    cursor: pointer;
    z-index: 900;
    transition: 0.3s;
    padding: 0;
    appearance: none;
    -webkit-appearance: none;
}

#addBtn:hover {
    transform: scale(1.08) rotate(90deg);
}

.sticky-note {
    position: absolute;
    width: 280px;
    padding: 18px 20px;
    border-radius: 8px;
    box-shadow: 3px 5px 15px rgba(0,0,0,0.15);
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    box-sizing: border-box;
}

.sticky-note:active {
    cursor: grabbing;
}

.sticky-note:hover {
    transform: scale(1.05) rotate(0deg);
    box-shadow: 5px 10px 20px rgba(0,0,0,0.3);
    z-index: 100;
}

.note-header {
    font-weight: bold;
    margin-bottom: 12px;
    border-bottom: 2px dashed rgba(0,0,0,0.2);
    padding-bottom: 8px;
    font-size: 16px;
}

.note-text {
    font-size: 18px;
    line-height: 1.6;
    word-wrap: break-word;
    word-break: break-word;
    margin-bottom: 15px;
    white-space: pre-wrap;
}

.comments-section {
    background: rgba(255,255,255,0.5);
    border-radius: 5px;
    padding: 10px;
    margin-bottom: 12px;
    font-size: 14px;
    max-height: 120px;
    overflow-y: auto;
    cursor: default;
    -webkit-overflow-scrolling: touch;
}

.comment-item {
    margin-bottom: 8px;
    border-bottom: 1px dotted rgba(0,0,0,0.1);
    padding-bottom: 4px;
    word-break: break-word;
}

.comment-user {
    font-weight: bold;
    color: #444;
}

.note-footer {
    margin-top: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
}

.footer-left {
    display: flex;
    gap: 15px;
    align-items: center;
}

.like-btn,
.comment-trigger {
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 0;
    color: #333;
    appearance: none;
    -webkit-appearance: none;
}

.like-active {
    color: #e74c3c;
}

.action-btns {
    display: flex;
    gap: 8px;
}

.action-btn {
    background: rgba(255,255,255,0.6);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    padding: 6px 10px;
    appearance: none;
    -webkit-appearance: none;
}

.admin-badge {
    position: fixed;
    top: 14px;
    right: 16px;
    z-index: 950;
    background: rgba(255,255,255,0.92);
    border: 1px solid #ffd27a;
    color: #8a5b00;
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 13px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.empty-tip {
    text-align: center;
    color: #666;
    font-size: 24px;
    margin-top: 100px;
}

@media (max-width: 1024px) {
    #board {
        width: 980px;
        min-width: 100%;
        height: 1500px;
    }

    .sticky-note {
        width: 250px;
        padding: 16px 18px;
    }

    .note-text {
        font-size: 16px;
    }
}

@media (max-width: 768px) {
    body {
        font-size: 16px;
    }

    h1 {
        font-size: 30px;
        margin-bottom: 12px;
        padding-top: 18px;
    }

    #syncStatus {
        font-size: 12px;
        margin-bottom: 10px;
    }

    #board {
        width: 760px;
        min-width: 100%;
        height: 1500px;
    }

    .sticky-note {
        width: 220px;
        padding: 14px 16px;
    }

    .note-header {
        font-size: 15px;
    }

    .note-text {
        font-size: 15px;
        line-height: 1.5;
    }

    .comments-section {
        font-size: 13px;
        max-height: 100px;
    }

    .like-btn,
    .comment-trigger {
        font-size: 14px;
    }

    .action-btn {
        font-size: 13px;
        padding: 5px 8px;
    }

    .modal-content {
        padding: 18px;
        border-radius: 12px;
    }

    .modal-content h2 {
        font-size: 24px;
    }

    .modal-content input,
    .modal-content textarea {
        font-size: 16px;
    }

    .btn {
        font-size: 16px;
        padding: 10px 14px;
    }

    #addBtn {
        right: 16px;
        bottom: 16px;
        width: 64px;
        height: 64px;
        line-height: 64px;
        font-size: 36px;
    }

    .admin-badge {
        top: 10px;
        right: 10px;
        font-size: 12px;
        padding: 6px 10px;
    }
}
</style>
</head>
<body>
    <h1>✨ 手部受限活动留言 ✨</h1>
    <div id="syncStatus">正在加载留言…</div>

    <div id="adminBadge" class="admin-badge" style="display:none;">管理员模式已开启</div>

    <div id="boardWrap">
        <div id="board"></div>
    </div>

    <button id="addBtn" onclick="openModal()">+</button>

    <div id="myModal">
        <div class="modal-content">
            <h2>留下你的足迹</h2>
            <input type="text" id="userNameInput" placeholder="你的名字（必填）">
            <input type="text" id="userDeptInput" placeholder="所属部门（必填）">
            <input type="password" id="adminPasswordInput" placeholder="管理员密码（非必填）">
            
            <textarea id="userMessageInput" placeholder="写下你想说的话..."></textarea>
            <div class="btn-group">
                <button class="btn btn-close" onclick="closeModal()">取消</button>
                <button class="btn" onclick="submitMessage()">贴上留言</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBLxME8s4RCB-AMZ5NeuRAlFJF5fSKhNpA",
            authDomain: "shoubuhsouxian.firebaseapp.com",
            databaseURL: "https://shoubuhsouxian-default-rtdb.firebaseio.com",
            projectId: "shoubuhsouxian",
            storageBucket: "shoubuhsouxian.firebasestorage.app",
            messagingSenderId: "1059852842523",
            appId: "1:1059852842523:web:4eb41745c5b59ffffeeabe",
            measurementId: "G-NZC53QYRQY"
        };

        const ADMIN_PASSWORD = "hut2026";
        const CACHE_KEY = "message_cache_v2";

        function safeGet(storage, key, fallback) {
            try {
                const value = storage.getItem(key);
                return value === null ? fallback : value;
            } catch (e) {
                return fallback;
            }
        }

        function safeSet(storage, key, value) {
            try {
                storage.setItem(key, value);
            } catch (e) {}
        }

        function safeRemove(storage, key) {
            try {
                storage.removeItem(key);
            } catch (e) {}
        }

        function safeParseJSON(text, fallback) {
            try {
                return JSON.parse(text);
            } catch (e) {
                return fallback;
            }
        }

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const messagesRef = db.ref("messages");

        const colors = [
            "#ff9a9e", "#fecfef", "#a1c4fd", "#fdcbf1",
            "#e0c3fc", "#8fd3f4", "#f6d365", "#fda085"
        ];

        const modal = document.getElementById("myModal");
        const nameInput = document.getElementById("userNameInput");
        const deptInput = document.getElementById("userDeptInput");
        const adminPasswordInput = document.getElementById("adminPasswordInput");
        const msgInput = document.getElementById("userMessageInput");
        const board = document.getElementById("board");
        const adminBadge = document.getElementById("adminBadge");
        const syncStatus = document.getElementById("syncStatus");

        let messages = [];
        let currentUser = safeGet(sessionStorage, "current_user", "");
        let currentDept = safeGet(sessionStorage, "current_dept", "");
        let currentUserId = safeGet(sessionStorage, "current_user_id", "");
        let isAdmin = safeGet(sessionStorage, "is_admin", "false") === "true";

        if (!currentUserId) {
            currentUserId = "user_" + Date.now() + "_" + Math.random().toString(36).slice(2, 10);
            safeSet(sessionStorage, "current_user_id", currentUserId);
        }

        function updateAdminBadge() {
            adminBadge.style.display = isAdmin ? "block" : "none";
        }

        function setStatus(text) {
            syncStatus.textContent = text;
        }

        function saveCache() {
            safeSet(localStorage, CACHE_KEY, JSON.stringify(messages));
        }

        function loadCache() {
            const cacheText = safeGet(localStorage, CACHE_KEY, "[]");
            const cache = safeParseJSON(cacheText, []);
            if (Array.isArray(cache) && cache.length > 0) {
                messages = cache;
                renderMessages();
                setStatus("已显示缓存内容，正在同步最新留言…");
            } else {
                setStatus("正在加载留言…");
            }
        }

        function updateSessionIdentity() {
            safeSet(sessionStorage, "current_user", currentUser);
            safeSet(sessionStorage, "current_dept", currentDept);
            safeSet(sessionStorage, "is_admin", isAdmin ? "true" : "false");
        }

        updateAdminBadge();
        loadCache();

        window.onload = function () {
            if (currentUser) nameInput.value = currentUser;
            if (currentDept) deptInput.value = currentDept;
        };

        messagesRef.on("value", function (snapshot) {
            const data = snapshot.val() || {};
            messages = Object.keys(data).map(function(key) {
                const item = data[key] || {};
                item.id = key;
                return item;
            });

            messages.sort(function(a, b) {
                return (b.createdAt || 0) - (a.createdAt || 0);
            });

            saveCache();
            renderMessages();
            setStatus("已同步 " + messages.length + " 条留言");
        }, function () {
            setStatus("同步失败，当前显示缓存内容");
        });

        function openModal() {
            if (currentUser) nameInput.value = currentUser;
            if (currentDept) deptInput.value = currentDept;
            adminPasswordInput.value = "";
            modal.style.display = "flex";
        }

        function closeModal() {
            modal.style.display = "none";
        }

        function ensureIdentity() {
            if (!currentUser || !currentDept) {
                alert("请先填写你的名字和部门。");
                openModal();
                return false;
            }
            return true;
        }

        function getNoteWidth() {
            if (window.innerWidth <= 768) return 220;
            if (window.innerWidth <= 1024) return 250;
            return 280;
        }

        function submitMessage() {
            const name = nameInput.value.trim();
            const dept = deptInput.value.trim();
            const text = msgInput.value.trim();
            const adminPwd = adminPasswordInput.value.trim();

            if (!name || !dept || !text) {
                alert("请填全所有信息哦！");
                return;
            }

            currentUser = name;
            currentDept = dept;

            if (adminPwd) {
                if (adminPwd === ADMIN_PASSWORD) {
                    isAdmin = true;
                } else {
                    isAdmin = false;
                    alert("管理员密码不正确，将以普通用户身份进入。");
                }
            }

            updateSessionIdentity();
            updateAdminBadge();

            const boardWidth = board.offsetWidth;
            const noteWidth = getNoteWidth();
            const maxLeft = Math.max(40, boardWidth - noteWidth - 40);

            const newMessage = {
                ownerId: currentUserId,
                name: name,
                dept: dept,
                text: text,
                color: colors[Math.floor(Math.random() * colors.length)],
                top: Math.floor(Math.random() * 1280) + "px",
                left: Math.floor(Math.random() * maxLeft + 20) + "px",
                rotation: (Math.random() * 20 - 10).toFixed(2),
                createdAt: Date.now(),
                likes: {},
                comments: {}
            };

            setStatus("正在提交留言…");

            messagesRef.push(newMessage)
                .then(function () {
                    msgInput.value = "";
                    adminPasswordInput.value = "";
                    closeModal();
                    setStatus("留言提交成功，正在同步最新内容…");
                })
                .catch(function (err) {
                    alert("留言提交失败：" + err.message);
                    setStatus("留言提交失败");
                });
        }

        function toggleLike(messageId) {
            if (!ensureIdentity()) return;

            const likeRef = messagesRef.child(messageId).child("likes").child(currentUserId);
            likeRef.once("value", function (snapshot) {
                if (snapshot.exists()) {
                    likeRef.remove();
                } else {
                    likeRef.set({
                        userId: currentUserId,
                        name: currentUser,
                        dept: currentDept
                    });
                }
            });
        }

        function addComment(messageId) {
            if (!ensureIdentity()) return;

            const commentText = prompt("请输入你的评论：");
            if (!commentText || !commentText.trim()) return;

            messagesRef.child(messageId).child("comments").push({
                userId: currentUserId,
                user: currentUser,
                dept: currentDept,
                text: commentText.trim(),
                createdAt: Date.now()
            });
        }

        function deleteMessage(messageId) {
            const msg = messages.find(function(m) { return m.id === messageId; });
            if (!msg) return;

            if (!isAdmin && msg.ownerId !== currentUserId) {
                alert("只能删除自己发布的留言。");
                return;
            }

            if (confirm("确定要删除这条留言吗？")) {
                messagesRef.child(messageId).remove();
            }
        }

        function editMessage(messageId) {
            const msg = messages.find(function(m) { return m.id === messageId; });
            if (!msg) return;

            if (!isAdmin && msg.ownerId !== currentUserId) {
                alert("只能修改自己发布的留言。");
                return;
            }

            const newText = prompt("修改留言内容：", msg.text || "");
            if (!newText || !newText.trim()) return;

            messagesRef.child(messageId).update({
                text: newText.trim()
            });
        }

        function renderMessages() {
            board.innerHTML = "";

            if (!messages.length) {
                const empty = document.createElement("div");
                empty.className = "empty-tip";
                empty.textContent = "还没有留言，来写下第一条吧～";
                board.appendChild(empty);
                return;
            }

            messages.forEach(function(msg) {
                const note = document.createElement("div");
                note.className = "sticky-note";
                note.style.backgroundColor = msg.color || "#fff3a3";
                note.style.top = msg.top || "100px";
                note.style.left = msg.left || "20px";
                note.style.transform = "rotate(" + (msg.rotation || 0) + "deg)";

                const likesObj = msg.likes || {};
                const likesCount = Object.keys(likesObj).length;
                const hasLiked = !!likesObj[currentUserId];

                const commentsObj = msg.comments || {};
                const comments = Object.keys(commentsObj)
                    .map(function(key) { return commentsObj[key]; })
                    .sort(function(a, b) { return (a.createdAt || 0) - (b.createdAt || 0); });
                const commentsCount = comments.length;

                let commentsHtml = "";
                if (comments.length > 0) {
                    commentsHtml = '<div class="comments-section" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">';
                    comments.forEach(function(c) {
                        commentsHtml += '<div class="comment-item"><span class="comment-user">' +
                            escapeHtml(c.user || "匿名") + '：</span>' + escapeHtml(c.text || "") + '</div>';
                    });
                    commentsHtml += "</div>";
                }

                const canEditOrDelete = isAdmin || msg.ownerId === currentUserId;

                let actionHtml = "";
                if (canEditOrDelete) {
                    actionHtml =
                        '<div class="action-btns">' +
                        '<button class="action-btn" onclick="editMessage(\'' + msg.id + '\')">✏️</button>' +
                        '<button class="action-btn" onclick="deleteMessage(\'' + msg.id + '\')">🗑️</button>' +
                        '</div>';
                }

                note.innerHTML =
                    '<div class="note-header">👤 ' + escapeHtml(msg.name || "") +
                    ' <span style="color:#666; font-weight:normal; font-size:14px;">(' +
                    escapeHtml(msg.dept || "") + ')</span></div>' +
                    '<div class="note-text">' + escapeHtml(msg.text || "") + '</div>' +
                    commentsHtml +
                    '<div class="note-footer">' +
                        '<div class="footer-left">' +
                            '<button class="like-btn ' + (hasLiked ? "like-active" : "") + '" onclick="toggleLike(\'' + msg.id + '\')">' +
                                (hasLiked ? "❤️" : "🤍") + ' ' + likesCount +
                            '</button>' +
                            '<button class="comment-trigger" onclick="addComment(\'' + msg.id + '\')">💬 ' + commentsCount + '</button>' +
                        '</div>' +
                        actionHtml +
                    '</div>';

                makeDraggable(note, msg.id, msg.rotation || 0);
                board.appendChild(note);
            });
        }

        function makeDraggable(element, messageId, rotation) {
            let isDragging = false;
            let startX = 0, startY = 0, initialLeft = 0, initialTop = 0;

            element.addEventListener("mousedown", dragStart);
            element.addEventListener("touchstart", dragStart, { passive: false });

            function dragStart(e) {
                if (e.target.closest("button") || e.target.closest(".comments-section")) return;

                isDragging = true;
                element.style.zIndex = 1000;
                element.style.transform = "scale(1.05) rotate(0deg)";

                if (e.type === "touchstart") {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                } else {
                    startX = e.clientX;
                    startY = e.clientY;
                }

                initialLeft = element.offsetLeft;
                initialTop = element.offsetTop;

                document.addEventListener("mousemove", drag);
                document.addEventListener("touchmove", drag, { passive: false });
                document.addEventListener("mouseup", dragEnd);
                document.addEventListener("touchend", dragEnd);
            }

            function drag(e) {
                if (!isDragging) return;
                if (e.type === "touchmove") e.preventDefault();

                let currentX = 0, currentY = 0;
                if (e.type === "touchmove") {
                    currentX = e.touches[0].clientX;
                    currentY = e.touches[0].clientY;
                } else {
                    currentX = e.clientX;
                    currentY = e.clientY;
                }

                const dx = currentX - startX;
                const dy = currentY - startY;

                element.style.left = (initialLeft + dx) + "px";
                element.style.top = (initialTop + dy) + "px";
            }

            function dragEnd() {
                if (!isDragging) return;
                isDragging = false;

                element.style.zIndex = "";
                element.style.transform = "rotate(" + rotation + "deg)";

                document.removeEventListener("mousemove", drag);
                document.removeEventListener("touchmove", drag);
                document.removeEventListener("mouseup", dragEnd);
                document.removeEventListener("touchend", dragEnd);

                messagesRef.child(messageId).update({
                    left: element.style.left,
                    top: element.style.top
                });
            }
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        window.onclick = function (event) {
            if (event.target === modal) closeModal();
        };
    </script>
</body>
</html>
