<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<!-- ✅ 关键修改1：允许缩小 -->
<meta name="viewport" content="width=device-width, initial-scale=0.65, minimum-scale=0.45, maximum-scale=3.0, user-scalable=yes">

<title>手部受限活动留言</title>

<style>
body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    font-family: 'Segoe UI', sans-serif;
    overflow-x: auto;
}

/* 标题自适应 */
h1 {
    text-align: center;
    font-size: clamp(28px, 5vw, 60px);
    margin: 20px 0;
}

/* 可横向滚动 */
#boardWrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}

/* 画布 */
#board {
    position: relative;
    width: max(100%, 1200px);
    height: 1500px;
}

/* 按钮 */
#addBtn {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #ff6b6b;
    color: white;
    font-size: 40px;
    border: none;
}

/* 留言 */
.sticky-note {
    position: absolute;
    width: 280px;
    padding: 15px;
    border-radius: 8px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    background: #fff3a3;
}

/* 手机适配 */
@media (max-width:768px){

    /* ✅ 关键修改2：手机画布缩小 */
    #board {
        width: max(100%, 760px);
        height: 1500px;
    }

    .sticky-note{
        width:220px;
        font-size:14px;
    }

    #addBtn{
        width:60px;
        height:60px;
        font-size:30px;
    }
}
</style>
</head>

<body>

<h1>✨ 手部受限活动留言 ✨</h1>

<div id="boardWrap">
    <div id="board"></div>
</div>

<button id="addBtn" onclick="openModal()">+</button>

<!-- 弹窗 -->
<div id="myModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;">
    <div style="background:#fff;padding:20px;border-radius:10px;width:90%;max-width:400px;">
        <input id="name" placeholder="名字"><br><br>
        <input id="dept" placeholder="部门"><br><br>
        <textarea id="msg" placeholder="留言"></textarea><br><br>
        <button onclick="submit()">提交</button>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyBLxME8s4RCB-AMZ5NeuRAlFJF5fSKhNpA",
authDomain: "shoubuhsouxian.firebaseapp.com",
databaseURL: "https://shoubuhsouxian-default-rtdb.firebaseio.com",
projectId: "shoubuhsouxian"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ref = db.ref("messages");

const board = document.getElementById("board");

let userId = localStorage.getItem("uid");
if(!userId){
    userId = Date.now()+"";
    localStorage.setItem("uid",userId);
}

/* 监听数据 */
ref.on("value",snap=>{
    const data = snap.val()||{};
    board.innerHTML="";
    Object.keys(data).forEach(id=>{
        const m=data[id];

        const div=document.createElement("div");
        div.className="sticky-note";

        div.style.top=m.top;
        div.style.left=m.left;

        div.innerHTML=`
            <b>${m.name}</b><br>
            <small>${m.dept}</small><br><br>
            ${m.text}
        `;

        board.appendChild(div);
    });
});

/* 打开弹窗 */
function openModal(){
    document.getElementById("myModal").style.display="flex";
}

/* 提交 */
function submit(){

    const name=document.getElementById("name").value;
    const dept=document.getElementById("dept").value;
    const text=document.getElementById("msg").value;

    const w=board.offsetWidth;

    ref.push({
        name,dept,text,
        top:Math.random()*1300+"px",
        left:Math.random()*(w-200)+"px"
    });

    document.getElementById("myModal").style.display="none";
}
</script>

</body>
</html>
